his post has not yet been published. Please try again later.</span></div></main><style data-emotion="css veabif">.css-veabif{box-sizing:border-box;margin:0;min-width:0;padding:32px;color:#666;text-align:center;font-size:14px;}</style><div class="css-veabif"><style data-emotion="css i57cvr">.css-i57cvr{box-sizing:border-box;margin:0;min-width:0;margin-left:16px;margin-right:16px;display:inline-block;}</style><span class="css-i57cvr">Created by<!-- --> <style data-emotion="css opel85">.css-opel85{color:var(--theme-ui-colors-primary, #076873);}</style><a href="https://github.com/erikdstock" target="_blank" rel="noreferrer" class="css-opel85">Erik Stockmeier</a></span><span class="css-i57cvr">Source available on<!-- --> <a href="https://github.com/erikdstock/erik-online">Github</a></span></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"post":{"title":"Using group_by (from Ruby's Enumerable mixin)","date":"2015-2-07","slug":"2015-02-07-enumerables","content":"\n\u003cp\u003e\nArrays and hashes wouldn't be useful as containers for groups of elements if we didn't also have methods that could specifically get inside these containers to work through them. The most straightforward way we can do this is with the method \u003cstrong\u003eeach\u003c/strong\u003e:\n\u003c/p\u003e\n\u003cdiv class=\"code\"\u003e\n\u003cpre\u003e#I live in a commune, sort of...\ncommune_members = [\"eden\", \"charleen\", \"steff\", \"klint\", \"dovis\", \"eirik\", \"endrea\", \"brenda\"]\ncommune_members.each {|name| puts name.capitalize}\n=\u003e Eden\n=\u003e Charleen\n=\u003e Steff\n=\u003e Klint\n=\u003e Dovis\n=\u003e Eirik\n=\u003e Endrea\n=\u003e Brenda\u003c/pre\u003e\n\u003c/div\u003e\n\u003cp\u003e\nOf course this is only a theoretical example-communes don't believe in capitalization- however, \u003cstrong\u003eeach\u003c/strong\u003e is one very simple way we can pass a block of code to every element in an array or hash. In fact, Ruby has an entire module for dealing with collections of data like this. The enumerable module provides methods that iterate over a group of elements, apply the same block of code to each piece, and process the result in some specific way. Some of these methods are pretty easy to understand at face value: \u003cstrong\u003edelete_if\u003c/strong\u003e passes a block of code and deletes those values from the receiving object that return true.\n\u003c/p\u003e\n\u003cp\u003e\nA slightly more complicated method is \u003cstrong\u003egroup_by\u003c/strong\u003e. As with other enumerable methods, the same basic priciple of iteration is at play; \u003cstrong\u003egroup_by\u003c/strong\u003e differs from each because it is looking for a block of code that will return something- something probably different and specific. Ruby keeps track of these returns (still inside our hash, array, etc) and passes them back to \u003cstrong\u003egroup_by\u003c/strong\u003e along with our original values, and then returns to us a hash with each unique return a key and each complementary value an array of elements that gave that return:\n\u003c/p\u003e\n\u003cdiv class=\"code\"\u003e\n\u003cpre\u003e#Dovis didn't wash the dishes again this week AND blew off house meeting. Now is our chance to find a gentle way of kicking them out...\ncommune_members.group_by { |name| name.include?(\"o\") }\n=\u003e {false=\u003e[\"eden\", \"charleen\", \"steff\", \"klint\", \"eirik\", \"endrea\", \"brenda\"], true=\u003e[\"dovis\"]} \u003c/pre\u003e\n\u003c/div\u003e\n\u003cp\u003e\nSee? It's not you, Dovis. We just don't want any more \"o\" names in the house. It was a decision made by the community on pricinple and we couldn't have really even known whom it would affect until we called the \u003cstrong\u003egroup_by\u003c/strong\u003e method, which made things pretty easy.\n\u003c/p\u003e\n","draft":true}},"__N_SSG":true},"page":"/[slug]","query":{"slug":"2015-02-07-enumerables"},"buildId":"682mYydrbzrxKo8C8bwON","nextExport":false,"isFallback":false,"gsp":true}</script><script nomodule="" src="/_next/static/chunks/polyfills-28654a8145d7603786fc.js"></script><script src="/_next/static/chunks/main-103d9ca5598227c8ff51.js" async=""></script><script src="/_next/static/chunks/webpack-50bee04d1dc61f8adf5b.js" async=""></script><script src="/_next/static/chunks/framework.29f9e2f3d4a33bafbaa5.js" async=""></script><script src="/_next/static/chunks/commons.c400acee736497617338.js" async=""></script><script src="/_next/static/chunks/7ce85feca64c2ce0fbbdcfbd50dc3fa9cb40dd3a.390e22cd8d940fd9e5f3.js" async=""></script><script src="/_next/static/chunks/pages/_app-2d6f78ef571438869cde.js" async=""></script><script src="/_next/static/chunks/d57d79ab.4ef0ef0016df9a645ef1.js" async=""></script><script src="/_next/static/chunks/ff39441c.ce36bc305bb110ee5bf8.js" async=""></script><script src="/_next/static/chunks/c015c2b74090d768671f5740e8daea6b24bcfac5.85878c0d3e2e47d9926d.js" async=""></script><script src="/_next/static/chunks/b6ca025f3b3cf385702b5034f2914ab96707b263.e2495e0465efede4d869.js" async=""></script><script src="/_next/static/chunks/pages/%5Bslug%5D-5f92f9967f31e4d01132.js" async=""></script><script src="/_next/static/682mYydrbzrxKo8C8bwON/_buildManifest.js" async=""></script><script src="/_next/static/682mYydrbzrxKo8C8bwON/_ssgManifest.js" async=""></script></body></html>
